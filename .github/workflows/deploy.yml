name: Deploy Postcard Backend
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create D1 database and deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Try to create database (will fail gracefully if exists)
          DB_OUTPUT=$(wrangler d1 create postcard-db 2>&1 || true)
          echo "$DB_OUTPUT"
          
          # Extract database ID from create output or list
          DB_ID=$(echo "$DB_OUTPUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          
          if [ -z "$DB_ID" ]; then
            echo "Trying to find existing database..."
            LIST_OUTPUT=$(wrangler d1 list 2>&1)
            echo "$LIST_OUTPUT"
            DB_ID=$(echo "$LIST_OUTPUT" | grep 'postcard-db' | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          fi
          
          if [ -z "$DB_ID" ]; then
            echo "ERROR: Could not find or create database"
            exit 1
          fi
          
          echo "Using database ID: $DB_ID"
          
          # Update wrangler.toml with actual database ID
          sed -i "s/database_id = \"YOUR-DATABASE-ID-HERE\"/database_id = \"$DB_ID\"/" wrangler.toml
          cat wrangler.toml
          
          # Deploy worker
          echo "Deploying worker..."
          wrangler deploy
